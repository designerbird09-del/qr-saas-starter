name: NodeJS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            qr-saas/backend/package-lock.json
            qr-saas/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: qr-saas/backend
        run: npm ci

      - name: Build backend
        working-directory: qr-saas/backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: qr-saas/frontend
        run: npm ci

      - name: Build frontend
        working-directory: qr-saas/frontend
        run: npm run build
